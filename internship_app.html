<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internship Finder</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f7f8fb; color: #222; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.08); padding: 24px; max-width: 760px; margin: auto; }
    h1 { margin-top: 0; }
    label { display: block; margin: 12px 0 6px; }
    input, select, button { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
    button { background: #276ef1; color: rgb(105, 17, 17); border: none; cursor: pointer; margin-top: 16px; }
    button:hover { background: #1558d6; }
    .result { border-top: 1px solid #eee; padding: 16px 0; }
    .result + .result { border-top: 1px solid #eee; }
    .result h3 { margin: 0 0 6px; }
    .result p { margin: 4px 0; }
    .online { color: #0a7; font-weight: bold; }
    .offline { color: #f06; font-weight: bold; }
    .note { margin-top: 14px; color: #555; }
    .error { color: #c00; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Internship Finder</h1>
    <p>Search local and online internship opportunities for college students in your area.</p>

    <label for="locality">Your city/locality</label>
    <input id="locality" type="text" placeholder="e.g. Srinagar" />

    <label for="mode">Search mode</label>
    <select id="mode">
      <option value="both">Both</option>
      <option value="offline">Offline</option>
      <option value="online">Online</option>
    </select>

    <button id="searchButton">Search internships</button>
    <p class="note">Offline listings include college-friendly roles with apply links and eligibility criteria. Online results come from live remote internship listings.</p>
    <div id="message"></div>
    <div id="results"></div>
  </div>

  <script>
    const localInternships = [
      { title: 'Marketing Intern', company: 'Local Media Co.', location: 'Srinagar', mode: 'Offline', url: 'https://localmediaco.example.com/apply', eligibility: 'College student in any commerce/arts stream; basic communication skills' },
      { title: 'Web Development Intern', company: 'Tech Local Pvt Ltd', location: 'Srinagar', mode: 'Offline', url: 'https://techlocal.example.com/internship', eligibility: 'Computer science / IT student; HTML, CSS, JavaScript basics' },
      { title: 'Graphic Design Intern', company: 'Creative Studio', location: 'Anantnag', mode: 'Offline', url: 'https://creativestudio.example.com/join', eligibility: 'Design or arts student; basic Adobe Photoshop/Illustrator skills' },
      { title: 'IT Support Intern', company: 'City Services', location: 'Baramulla', mode: 'Offline', url: 'https://cityservices.example.com/careers', eligibility: 'Any college student with interest in IT support and troubleshooting' },
      { title: 'Content Intern', company: 'Edu Writes', location: 'Srinagar', mode: 'Offline', url: 'https://eduwrites.example.com/intern', eligibility: 'College student with strong writing skills and interest in education content' }
    ];

    const resultsEl = document.getElementById('results');
    const messageEl = document.getElementById('message');
    const localityEl = document.getElementById('locality');
    const modeEl = document.getElementById('mode');
    const buttonEl = document.getElementById('searchButton');

    function normalize(text) {
      return text.trim().toLowerCase();
    }

    function renderItems(items) {
      resultsEl.innerHTML = items.length === 0
        ? '<p>No internships found for this search.</p>'
        : items.map(item => `
            <div class="result">
              <h3>${item.title}</h3>
              <p><strong>Company:</strong> ${item.company}</p>
              <p><strong>Location:</strong> ${item.location}</p>
              <p class="${item.mode.toLowerCase()}"><strong>Mode:</strong> ${item.mode}</p>
              ${item.eligibility ? `<p><strong>Eligibility:</strong> ${item.eligibility}</p>` : ''}
              ${item.url ? `<p><a href="${item.url}" target="_blank">Apply link</a></p>` : ''}
            </div>`
          ).join('');
    }

    function filterOffline(locality) {
      const query = normalize(locality);
      return localInternships.filter(item => normalize(item.location).includes(query));
    }

    function filterOnline(jobs, locality) {
      const query = normalize(locality);
      return jobs.filter(job => {
        const location = normalize(job.location || 'Worldwide');
        return location.includes('worldwide') || location.includes('remote') || location.includes(query);
      }).map(job => ({
        title: job.title,
        company: job.company_name,
        location: job.candidate_required_location || 'Worldwide',
        mode: 'Online',
        url: job.url
      }));
    }

    async function fetchOnlineJobs() {
      const response = await fetch('https://remotive.com/api/remote-jobs?search=internship');
      if (!response.ok) throw new Error('Failed to fetch online internships.');
      const data = await response.json();
      return Array.isArray(data.jobs) ? data.jobs : [];
    }

    buttonEl.addEventListener('click', async () => {
      const locality = localityEl.value.trim();
      const mode = modeEl.value;
      messageEl.textContent = '';
      resultsEl.innerHTML = '<p>Searching...</p>';

      if (!locality) {
        messageEl.innerHTML = '<p class="error">Please enter a city or locality.</p>';
        resultsEl.innerHTML = '';
        return;
      }

      const items = [];
      if (mode === 'offline' || mode === 'both') {
        items.push(...filterOffline(locality).map(item => ({ ...item, mode: 'Offline' })));
      }

      if (mode === 'online' || mode === 'both') {
        try {
          const jobs = await fetchOnlineJobs();
          items.push(...filterOnline(jobs, locality));
        } catch (error) {
          messageEl.innerHTML = `<p class="error">${error.message}</p>`;
        }
      }

      renderItems(items);
    });
  </script>
</body>
</html>
